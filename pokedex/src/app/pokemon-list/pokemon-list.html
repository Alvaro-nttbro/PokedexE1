@defer (on viewport) {
  <div class="list">
    @for(p of pokemons(); track $index){
        <div class="pokemon-card">
            <div class="pokemon-info">
                <img src="{{p.sprites.front_default}}"/>
                <span></span>
                <span>
                    #{{p.id}}
                    {{p.name}}
                    <a [routerLink]="['/details', p.id]" routerLinkActive="router-link-active">Details</a>
                </span>
            </div>
        </div>
    }
  </div>
} @error {
    <p>Failed to load pokemons</p>
} @placeholder {
  <h1>Pokemon List</h1>
} @loading (minimum 1s) {
    <div class="load-container">
        <h1 class="load">Loading pokemons...</h1>

        <div class="three-body">
            <div class="three-body__dot"></div>
            <div class="three-body__dot"></div>
            <div class="three-body__dot"></div>
        </div>
    </div>
}

<div class="actions">
    <button (click)="prev()">Previous</button>
    <span>{{page()}}</span>
    <button (click)="next()">Next</button>
</div>

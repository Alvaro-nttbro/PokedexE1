<div>
    @for(p of pokes; track $index){
        <div>
            <img src="{{p.sprites.front_default}}"/>
            <span>{{p.id}} | </span>
            <a [routerLink]="['/details', p.id]" routerLinkActive="router-link-active">{{p.name}}</a>
        </div>
    }
</div>

<button>Next</button>
| {{page}} |
<button>Prev</button>
